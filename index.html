<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehmet Özbek</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background-color: #050505;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        #content {
            text-align: center;
            animation: fadeIn 2s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: clamp(2.5rem, 10vw, 4rem);
            letter-spacing: 15px;
            margin-bottom: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        p {
            font-size: 0.8rem;
            color: #666;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .player-bar {
            position: fixed;
            bottom: 40px;
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .track-name {
            font-size: 10px;
            color: #00c6ff;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .play-btn {
            width: 40px;
            height: 40px;
            background: #fff;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .play-btn:hover { transform: scale(1.1); background: #00c6ff; }
        .play-btn svg { width: 15px; fill: #000; }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .time { font-size: 10px; color: #444; min-width: 30px; }

        .bar-bg {
            flex-grow: 1;
            height: 4px;
            background: #1a1a1a;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            background: #00c6ff;
            border-radius: 10px;
            box-shadow: 0 0 10px #00c6ff;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>

    <audio id="audio" loop>
        <source src="mix.mp3" type="audio/mpeg">
    </audio>

    <div id="content">
        <h1>YAKINDA</h1>
        <p>MEHMET ÖZBEK</p>
    </div>

    <div class="player-bar">
        <div class="controls">
            <span class="track-name">Where Is My Mind (Piano Version)</span>
            <button class="play-btn" id="toggle-btn" onclick="togglePlay()">
                <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" style="display:none;" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
        </div>
        
        <div class="progress-container">
            <span class="time" id="current">0:00</span>
            <div class="bar-bg" id="progress-bar">
                <div class="bar-fill" id="fill"></div>
            </div>
            <span class="time" id="duration">0:00</span>
        </div>
    </div>

    <script>
        const audio = document.getElementById('audio');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const fill = document.getElementById('fill');
        const currentEl = document.getElementById('current');
        const durationEl = document.getElementById('duration');
        const progressBar = document.getElementById('progress-bar');

        function togglePlay() {
            if (audio.paused) {
                audio.play().catch(e => alert("Müzik dosyası (mix.mp3) bulunamadı!"));
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                audio.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return m + ":" + (sec < 10 ? "0" + sec : sec);
        }

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progress = (audio.currentTime / audio.duration) * 100;
                fill.style.width = progress + "%";
                currentEl.innerText = formatTime(audio.currentTime);
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            durationEl.innerText = formatTime(audio.duration);
        });

        progressBar.addEventListener('click', (e) => {
            const width = progressBar.clientWidth;
            const clickX = e.offsetX;
            audio.currentTime = (clickX / width) * audio.duration;
        });
    </script>
</body>
</html>
