<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehmet Özbek</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background-color: #050505;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* Giriş Ekranı */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: transform 1.2s cubic-bezier(0.8, 0, 0.2, 1);
        }

        .start-btn {
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
            padding: 15px 45px;
            font-size: 1.2rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(255,255,255,0); }
            100% { transform: scale(1); }
        }

        /* Ana İçerik */
        #content {
            text-align: center;
            opacity: 0;
            transition: 2s ease 0.5s;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 15px;
            margin-bottom: 10px;
        }

        p {
            font-size: 0.8rem;
            color: #666;
            letter-spacing: 5px;
        }

        /* Spotify Player Alt Bar */
        .player-container {
            position: fixed;
            bottom: 40px;
            width: 80%;
            max-width: 500px;
            text-align: center;
            opacity: 0;
            transition: 1.5s ease 1s;
        }

        .track-info {
            font-size: 0.7rem;
            color: #00c6ff;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .progress-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .time { font-size: 10px; color: #555; width: 35px; }

        .progress-bar {
            flex-grow: 1;
            height: 4px;
            background: #222;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #00c6ff;
            box-shadow: 0 0 10px #00c6ff;
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        /* Aktiflik */
        body.active #overlay { transform: translateY(-100%); }
        body.active #content, body.active .player-container { opacity: 1; }

    </style>
</head>
<body>

    <div id="overlay">
        <button class="start-btn" onclick="init()">BAŞLAT</button>
    </div>

    <audio id="music" loop>
        <source src="mix.mp3" type="audio/mpeg">
    </audio>

    <div id="content">
        <h1>YAKINDA</h1>
        <p>MEHMET ÖZBEK</p>
    </div>

    <div class="player-container">
        <div class="track-info">Where Is My Mind (Piano Version)</div>
        <div class="progress-wrapper">
            <span class="time" id="current-time">0:00</span>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <span class="time" id="duration">0:00</span>
        </div>
    </div>

    <script>
        const audio = document.getElementById('music');
        const progressFill = document.getElementById('progress-fill');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');

        function init() {
            document.body.classList.add('active');
            audio.play();
        }

        // Zaman Formatlama (0:00 şeklinde)
        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return min + ":" + (sec < 10 ? "0" + sec : sec);
        }

        // Çubuk Güncelleme
        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = percent + "%";
            currentTimeEl.innerText = formatTime(audio.currentTime);
        });

        // Toplam Süreyi Alma
        audio.addEventListener('loadedmetadata', () => {
            durationEl.innerText = formatTime(audio.duration);
        });
    </script>
</body>
</html>
