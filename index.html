<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehmet Özbek | Yapım Aşamasında</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #050505;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        /* Giriş Ekranı (Overlay) */
        #enter-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            cursor: pointer;
            transition: opacity 1s ease;
        }

        #enter-screen span {
            font-size: 0.9rem;
            letter-spacing: 5px;
            color: #555;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* Ana İçerik (Başlangıçta gizli) */
        .content {
            opacity: 0;
            transition: opacity 2s ease;
            width: 90%; /* Mobil için genişlik */
            max-width: 600px;
        }

        .title {
            font-size: clamp(2.5rem, 10vw, 4.5rem); /* Mobil uyumlu yazı boyutu */
            font-weight: 800;
            letter-spacing: 5px;
            line-height: 1.1;
            text-transform: uppercase;
            background: linear-gradient(45deg, #fff, #444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .line {
            width: 0;
            height: 2px;
            background: #00c6ff;
            margin: 20px auto;
            box-shadow: 0 0 20px #00c6ff;
        }

        .subtitle {
            font-size: clamp(0.8rem, 4vw, 1.1rem);
            color: #888;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Arka Plan Efekti */
        .glow {
            position: absolute;
            width: clamp(200px, 50vw, 400px);
            height: clamp(200px, 50vw, 400px);
            background: radial-gradient(circle, rgba(0, 198, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(50px);
        }

        /* Aktif Sınıfı */
        .is-active .content { opacity: 1; }
        .is-active .line { animation: growLine 2s ease forwards; animation-delay: 0.5s; }

        @keyframes growLine {
            from { width: 0; }
            to { width: 100px; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="muzik_dosyasi_yolu.mp3" type="audio/mpeg">
    </audio>

    <div id="enter-screen">
        <span>Sisteme Giriş Yap</span>
    </div>

    <div class="glow"></div>

    <div class="content">
        <h1 class="title">YAPIM<br>AŞAMASINDA</h1>
        <div class="line"></div>
        <p class="subtitle">MEHMET ÖZBEK | COMING SOON</p>
    </div>

    <script>
        const enterScreen = document.getElementById('enter-screen');
        const music = document.getElementById('bg-music');

        enterScreen.addEventListener('click', () => {
            // Müzik çalmayı başlat
            music.play().catch(e => console.log("Müzik başlatılamadı:", e));
            
            // Giriş ekranını gizle
            enterScreen.style.opacity = '0';
            setTimeout(() => {
                enterScreen.style.display = 'none';
                document.body.classList.add('is-active');
            }, 1000);
        });
    </script>
</body>
</html>
